<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SK CREATOR 7 - Movie Search & Tutorials</title>
    <link rel="stylesheet" href="https://unpkg.com/sheryjs/dist/Shery.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Josefin+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #3a0ca3;
            --secondary: #7209b7;
            --accent: #f72585;
            --dark: #0a0a0a;
            --light: #ffffff;
        }
        
        body {
            font-family: 'Josefin Sans', sans-serif;
            background-color: var(--dark);
            color: white;
            overflow-x: hidden;
            margin: 0;
            padding: 0;
        }
        
        nav {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 1.5rem 5%;
            position: fixed;
            width: 90%;
            top: 0;
            z-index: 100;
            background: rgba(10, 10, 10, 0.8);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--accent);
        }
        
        #heading {
            font-size: 1.8rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--accent), var(--primary));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            text-transform: uppercase;
            letter-spacing: 2px;
            margin: 0;
        }
        
        .nryt a {
            margin-left: 2rem;
            font-weight: 600;
            position: relative;
            padding: 0.5rem 0;
            color: white;
            text-decoration: none;
        }
        
        .nryt a::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 0;
            height: 3px;
            background: var(--accent);
            transition: width 0.3s ease;
        }
        
        .nryt a:hover::after {
            width: 100%;
        }
        
        .main {
            padding: 120px 5% 60px;
        }
        
        .search-box {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 50px;
            padding: 25px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.5);
            border: 3px solid var(--accent);
            max-width: 800px;
            margin: 0 auto;
        }
        
        .search-input {
            background: rgba(60, 65, 90, 0.7);
            border: none;
            border-bottom: 5px solid var(--primary);
            color: white;
            width: 100%;
            padding: 15px;
            font-size: 1.1rem;
            border-radius: 5px;
            margin-bottom: 15px;
        }
        
        .search-btn {
            background: linear-gradient(50deg, var(--primary), var(--secondary));
            color: white;
            font-weight: 600;
            border: none;
            padding: 12px 30px;
            border-radius: 50px;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }
        
        .search-btn i {
            margin-right: 10px;
        }
        
        .search-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0, 102, 255, 0.4);
        }
        
        .social-box {
            background: rgba(30, 41, 59, 0.8);
            border-radius: 10px;
            padding: 25px;
            margin: 40px auto;
            max-width: 800px;
            border: 1px solid var(--primary);
        }
        
        .social-title {
            text-align: center;
            font-size: 1.2rem;
            margin-bottom: 20px;
            color: var(--accent);
        }
        
        .social-links {
            display: flex;
            justify-content: center;
            gap: 20px;
        }
        
        .social-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            color: white;
            font-size: 1.5rem;
            transition: all 0.3s;
            text-decoration: none;
        }
        
        .telegram { background-color: #0088cc; }
        .whatsapp { background-color: #25D366; }
        .youtube { background-color: #FF0000; }
        
        .social-btn:hover {
            transform: scale(1.1) translateY(-5px);
        }
        
        .video-section {
            margin: 60px auto;
            max-width: 1200px;
            padding: 0 20px;
        }
        
        .section-title {
            text-align: center;
            font-size: 1.8rem;
            margin-bottom: 30px;
            color: var(--accent);
        }
        
        .video-box {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 30px;
        }
        
        .video-item {
            background: rgba(30, 41, 59, 0.7);
            border-radius: 10px;
            overflow: hidden;
            border: 1px solid var(--accent);
            transition: all 0.3s;
        }
        
        .video-item:hover {
            transform: translateY(-10px);
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
        }
        
        .video-item iframe {
            width: 100%;
            height: 200px;
            border: none;
        }
        
        .video-title {
            padding: 15px;
            text-align: center;
            font-weight: 600;
        }
        
        footer {
            background: rgba(10, 10, 10, 0.9);
            padding: 40px 5%;
            text-align: center;
            border-top: 1px solid var(--accent);
        }
        
        .copyright {
            margin-top: 20px;
        }
        
        @media (max-width: 768px) {
            nav {
                padding: 1rem 5%;
            }
            
            #heading {
                font-size: 1.4rem;
            }
            
            .nryt a {
                margin-left: 1rem;
                font-size: 0.9rem;
            }
            
            .search-box {
                padding: 20px;
                border-radius: 30px;
            }
            
            .video-box {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <nav>
        <div class="nleft">
            <a href="https://t.me/SK4FiLM">
                <h4 id="heading" class="magnet">SK 4 FiLM</h4>
            </a>
        </div>
        <div class="nryt">
            <a class="home-btn magnet" href="#main">HOME</a>
            <a href="#tutorials" class="about-btn magnet">TUTORIALS</a>
        </div>
    </nav>
    
    <div class="main" id="main">
        <div class="search-box">
            <form action="/search" method="get">
                <input type="text" name="query" class="search-input" placeholder="Search for movies..." required>
                <button class="search-btn magnet" type="submit">
                    <i class="fas fa-search"></i> Search
                </button>
            </form>
        </div>
        
        <div class="social-box">
            <h4 class="social-title">Connect With Us</h4>
            <div class="social-links">
                <a href="https://t.me/skfilmbot" class="social-btn telegram magnet">
                    <i class="fab fa-telegram"></i>
                </a>
                <a href="https://whatsapp.com/channel/0029Va69Ts2C6ZvmEWsHNo3c" class="social-btn whatsapp magnet">
                    <i class="fab fa-whatsapp"></i>
                </a>
                <a href="https://youtube.com/@Skcreator7" class="social-btn youtube magnet">
                    <i class="fab fa-youtube"></i>
                </a>
            </div>
        </div>
        
        <div class="video-section" id="tutorials">
            <h3 class="section-title">Tutorial Videos</h3>
            <div class="video-box">
                <div class="video-item">
                    <iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID_1" frameborder="0" allowfullscreen></iframe>
                    <div class="video-title">How to Search Movies</div>
                </div>
                <div class="video-item">
                    <iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID_2" frameborder="0" allowfullscreen></iframe>
                    <div class="video-title">Using Telegram Bot</div>
                </div>
                <div class="video-item">
                    <iframe src="https://www.youtube.com/embed/YOUR_VIDEO_ID_3" frameborder="0" allowfullscreen></iframe>
                    <div class="video-title">Advanced Features</div>
                </div>
            </div>
        </div>
    </div>
    
    <footer>
        <div class="copyright">
            <h5>Copyright © 2025 <a href="https://t.me/SK4FiLM" style="color: var(--accent);">SK</a>. All Rights Reserved.</h5>
            <h4>This Page Is Designed By <a href="https://t.me/SK4FiLM" style="color: var(--accent);">SK 4 FiLM</a></h4>
        </div>
    </footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sheryjs/dist/Shery.js"></script>
    <script>
        // Initialize magnet effect
        Shery.magnet(".magnet", {
            ease: "cubic-bezier(0.23, 1, 0.32, 1)",
            duration: 0.5
        });
        
        // Smooth scrolling
        document.querySelectorAll('a[href^="#"]').forEach(anchor => {
            anchor.addEventListener('click', function (e) {
                e.preventDefault();
                document.querySelector(this.getAttribute('href')).scrollIntoView({
                    behavior: 'smooth'
                });
            });
        });
    </script>
</body>
</html>
