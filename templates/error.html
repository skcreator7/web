<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - {{config.BOT_SESSION_NAME}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ff0000;
            --secondary: #0066ff;
            --accent: #00ccff;
            --dark: #0f172a;
            --light: #ffffff;
            --text: #f8f9fa;
        }
        
        body {
            background: url('https://vault.pictures/p/e7ed9c92475c4ae8bb92c0e38e9a507e') no-repeat center center fixed;
            background-size: cover;
            font-family: 'Poppins', sans-serif;
            color: var(--text);
            min-height: 100vh;
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, rgba(10, 10, 10, 0.95) 0%, rgba(0, 20, 40, 0.95) 100%);
            z-index: -1;
            animation: gradientPulse 15s ease infinite alternate;
        }
        
        @keyframes gradientPulse {
            0% { opacity: 0.9; }
            50% { opacity: 0.95; }
            100% { opacity: 0.9; }
        }
        
        .error-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .error-card {
            background: rgba(30, 41, 59, 0.9);
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1),
                        0 0 20px rgba(255, 0, 0, 0.3),
                        0 0 30px rgba(0, 102, 255, 0.3);
            text-align: center;
            max-width: 600px;
            width: 100%;
            border: 1px solid var(--primary);
            animation: borderGlow 4s infinite alternate;
            backdrop-filter: blur(5px);
        }
        
        @keyframes borderGlow {
            0% { border-color: var(--primary); box-shadow: 0 0 15px rgba(255, 0, 0, 0.3); }
            50% { border-color: var(--secondary); box-shadow: 0 0 20px rgba(0, 102, 255, 0.3); }
            100% { border-color: var(--accent); box-shadow: 0 0 25px rgba(0, 204, 255, 0.3); }
        }
        
        .error-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            animation: iconPulse 2s infinite alternate;
        }
        
        @keyframes iconPulse {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }
        
        .alert-danger {
            background: rgba(255, 0, 0, 0.1);
            border: 1px solid var(--primary);
            color: var(--text);
        }
        
        .action-btn {
            background: linear-gradient(45deg, var(--primary), var(--secondary));
            border: none;
            padding: 10px 25px;
            font-weight: 600;
            color: white;
            border-radius: 50px;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }
        
        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }
        
        .action-btn::after {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(
                to bottom right,
                rgba(255, 255, 255, 0) 45%,
                rgba(255, 255, 255, 0.5) 50%,
