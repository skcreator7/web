<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Error - {{config.BOT_SESSION_NAME}}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #6a11cb;
            --secondary: #2575fc;
            --accent: #ff4d4d;
        }
        
        .error-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
        }
        
        .error-card {
            background: white;
            border-radius: 15px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 600px;
            width: 100%;
        }
        
        .error-icon {
            font-size: 5rem;
            margin-bottom: 20px;
            background: linear-gradient(to right, var(--accent), #f94444);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
        }
        
        .action-btn {
            background: linear-gradient(to right, var(--primary), var(--secondary));
            border: none;
            padding: 10px 25px;
            font-weight: 600;
            color: white;
            border-radius: 50px;
            transition: all 0.3s;
            margin-top: 20px;
        }
        
        .action-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            color: white;
        }
        
        .social-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 8px 20px;
            border-radius: 50px;
            margin: 0 5px;
            font-weight: 500;
            transition: all 0.3s;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <div class="error-card animate__animated animate__zoomIn">
            <div class="error-icon">
                <i class="fas fa-exclamation-triangle"></i>
            </div>
            <h2 class="mb-3">Oops! Something went wrong</h2>
            <div class="alert alert-danger">
                {{ error }}
            </div>
            <a href="{{config.WEB_BASE_URL}}" class="btn action-btn">
                <i class="fas fa-home me-2"></i> Go Back Home
            </a>
            
            <div class="mt-4">
                <p>Need help? Contact us on:</p>
                <div class="mt-3">
                    <a href="https://t.me/{{config.UPDATES_CHANNEL}}" class="btn social-btn btn-outline-primary me-2">
                        <i class="fab fa-telegram me-2"></i> Telegram
                    </a>
                    <a href="https://whatsapp.com/channel/your-channel" class="btn social-btn btn-outline-success">
                        <i class="fab fa-whatsapp me-2"></i> WhatsApp
                    </a>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
